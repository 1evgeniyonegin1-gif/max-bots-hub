name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DEBUG: "false"
      DATABASE_URL: "sqlite+aiosqlite:///test.db"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install pytest
          pip install -r requirements.txt
          pip install loguru PyJWT || true
      - name: Prepare for tests
        run: |
          mv platform platform_pkg
          find . -name "*.py" -exec sed -i 's/from platform\./from platform_pkg./g' {} +
          find . -name "*.py" -exec sed -i 's/import platform\./import platform_pkg./g' {} +
      - name: Run tests
        run: pytest tests/test_content_generator.py::TestContentGeneratorPrompts -v
